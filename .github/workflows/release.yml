name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-postgres

jobs:
  # ── Pre-built SQLite extensions ─────────────────────────
  # Built against sqlcipher-libressl headers for compatibility.
  sqlite-ext:
    strategy:
      matrix:
        include:
          # Debian (glibc) — works on Debian, Ubuntu, RHEL, etc.
          - os: ubuntu-latest
            container: debian:bookworm
            artifact: qjson_ext-linux-glibc-x64.so
            deps: apt-get update && apt-get install -y gcc make libc6-dev libsqlite3-dev
          - os: ubuntu-24.04-arm
            container: debian:bookworm
            artifact: qjson_ext-linux-glibc-arm64.so
            deps: apt-get update && apt-get install -y gcc make libc6-dev libsqlite3-dev
          # Alpine (musl) — works on Alpine, Docker scratch, etc.
          - os: ubuntu-latest
            container: alpine:3.19
            artifact: qjson_ext-linux-musl-x64.so
            deps: apk add gcc make musl-dev sqlite-dev
          # macOS
          - os: macos-latest
            container: ""
            artifact: qjson_ext-macos-arm64.dylib
            deps: ""
          - os: macos-15
            container: ""
            artifact: qjson_ext-macos-x64.dylib
            deps: ""

    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container || null }}
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        if: matrix.deps != ''
        run: ${{ matrix.deps }}
      - name: Build
        run: |
          EXT=.so
          if echo "${{ matrix.artifact }}" | grep -q dylib; then EXT=.dylib; fi
          make qjson_ext$EXT
          cp qjson_ext$EXT ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Python package (sdist) ──────────────────────────────
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz

  # ── npm tarball ─────────────────────────────────────────
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Pack
        run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: "*.tgz"

  # ── Docker image ────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── C library + PG SQL ───────────────────────────────────
  bundles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: C library
        run: |
          tar czf qjson-c.tar.gz \
            native/qjson.h native/qjson.c \
            native/qjson_sqlite_ext.c \
            native/libbf/libbf.h native/libbf/libbf.c \
            native/libbf/cutils.h native/libbf/cutils.c \
            Makefile

      - uses: actions/upload-artifact@v4
        with:
          name: bundles
          path: |
            qjson-c.tar.gz
            sql/qjson_pg.sql

  # ── WASM: SQLCipher + QJSON extension ──────────────────
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout sqlcipher-libressl
        uses: actions/checkout@v4
        with:
          repository: wmacevoy/sqlcipher-libressl
          path: sqlcipher-libressl

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y tcl cmake

      - name: Build LibreSSL (native + WASM)
        run: |
          curl -sL https://github.com/libressl/portable/releases/download/v4.2.1/libressl-4.2.1.tar.gz | tar xz
          cd libressl-4.2.1
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/libressl \
            -DLIBRESSL_APPS=OFF -DLIBRESSL_TESTS=OFF -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc) && make install
          cd ..
          mkdir -p build-wasm && cd build-wasm
          emcmake cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/libressl-wasm \
            -DLIBRESSL_APPS=OFF -DLIBRESSL_TESTS=OFF -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_C_FLAGS="-DHAVE_TIMEGM -DHAVE_GETENTROPY -D__STDC_NO_ATOMICS__"
          emmake make -j$(nproc) crypto
          mkdir -p $HOME/libressl-wasm/lib
          cp crypto/libcrypto.a $HOME/libressl-wasm/lib/

      - name: Build WASM
        run: |
          SQLCIPHER_DIR=sqlcipher-libressl \
          LIBRESSL_NATIVE=$HOME/libressl \
          LIBRESSL_WASM=$HOME/libressl-wasm \
          ./wasm/build.sh sqlcipher-libressl

      - name: Package
        run: |
          tar czf qjson-sqlcipher-wasm.tar.gz \
            -C wasm/dist \
            sqlcipher.js sqlcipher.wasm \
            sqlcipher-worker.js sqlcipher-api.js \
            qjson-wasm.js

      - uses: actions/upload-artifact@v4
        with:
          name: qjson-sqlcipher-wasm
          path: qjson-sqlcipher-wasm.tar.gz

  # ── Publish to PyPI ─────────────────────────────────────
  publish-pypi:
    needs: [python]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true

  # ── Publish to npm ──────────────────────────────────────
  publish-npm:
    needs: [npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

  # ── GitHub Release ──────────────────────────────────────
  release:
    needs: [sqlite-ext, python, npm, docker, bundles, wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.so
            artifacts/*.dylib
            artifacts/*.tar.gz
            artifacts/*.tgz
            artifacts/qjson_pg.sql
