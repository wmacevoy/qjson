name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-postgres

jobs:
  # ── Pre-built SQLite extensions ─────────────────────────
  sqlite-ext:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: qjson_ext-linux-x64.so
            ext: .so
          - os: ubuntu-24.04-arm
            artifact: qjson_ext-linux-arm64.so
            ext: .so
          - os: macos-latest
            artifact: qjson_ext-macos-arm64.dylib
            ext: .dylib
          - os: macos-13
            artifact: qjson_ext-macos-x64.dylib
            ext: .dylib

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make qjson_ext${{ matrix.ext }}
      - name: Rename
        run: cp qjson_ext${{ matrix.ext }} ${{ matrix.artifact }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Python package (sdist) ──────────────────────────────
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: dist/*.tar.gz

  # ── npm tarball ─────────────────────────────────────────
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Pack
        run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: npm-tarball
          path: "*.tgz"

  # ── Docker image ────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── C library + PG SQL + WASM ───────────────────────────
  bundles:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: C library
        run: |
          tar czf qjson-c.tar.gz \
            native/qjson.h native/qjson.c \
            native/qjson_sqlite_ext.c \
            native/libbf/libbf.h native/libbf/libbf.c \
            native/libbf/cutils.h native/libbf/cutils.c \
            Makefile

      - name: WASM bundle
        run: |
          tar czf qjson-wasm.tar.gz \
            examples/wasm/qjson-wasm.js \
            examples/wasm/index.html \
            examples/wasm/README.md

      - uses: actions/upload-artifact@v4
        with:
          name: bundles
          path: |
            qjson-c.tar.gz
            qjson-wasm.tar.gz
            sql/qjson_pg.sql

  # ── Publish to PyPI ─────────────────────────────────────
  publish-pypi:
    needs: [python]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-sdist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true

  # ── Publish to npm ──────────────────────────────────────
  publish-npm:
    needs: [npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

  # ── GitHub Release ──────────────────────────────────────
  release:
    needs: [sqlite-ext, python, npm, docker, bundles]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.so
            artifacts/*.dylib
            artifacts/*.tar.gz
            artifacts/*.tgz
            artifacts/qjson_pg.sql
