name: Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  # ── Format tests (C, Python, JS) ─────────────────────────
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: C tests (with libbf + Lemon parser)
        run: |
          make test_qjson
          ./test_qjson

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python format tests
        run: python3 test/test_qjson.py

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: JS format tests
        run: node test/test-qjson.js

  # ── SQLite tests ──────────────────────────────────────────
  sqlite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build SQLite extension
        run: make qjson_ext.so

      - name: SQLite adapter tests
        run: python3 test/test_qjson_sql.py

  # ── WASM build (SQLCipher + QJSON + libbf) ────────────────
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout sqlcipher-libressl
        uses: actions/checkout@v4
        with:
          repository: wmacevoy/sqlcipher-libressl
          path: sqlcipher-libressl

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y tcl cmake

      - name: Download and build LibreSSL (native + WASM)
        run: |
          curl -sL https://github.com/libressl/portable/releases/download/v4.2.1/libressl-4.2.1.tar.gz | tar xz
          cd libressl-4.2.1
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/libressl \
            -DLIBRESSL_APPS=OFF -DLIBRESSL_TESTS=OFF -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc) && make install
          cd ..
          mkdir build-wasm && cd build-wasm
          emcmake cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/libressl-wasm \
            -DLIBRESSL_APPS=OFF -DLIBRESSL_TESTS=OFF -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_C_FLAGS="-DHAVE_TIMEGM -DHAVE_GETENTROPY -D__STDC_NO_ATOMICS__"
          emmake make -j$(nproc) crypto
          mkdir -p $HOME/libressl-wasm/lib
          cp crypto/libcrypto.a $HOME/libressl-wasm/lib/

      - name: Build SQLCipher amalgamation
        run: |
          cd sqlcipher-libressl
          ./configure --with-tempstore=yes \
            CFLAGS="-DSQLITE_HAS_CODEC -DSQLCIPHER_CRYPTO_OPENSSL \
                    -DSQLITE_EXTRA_INIT=sqlcipher_extra_init \
                    -DSQLITE_EXTRA_SHUTDOWN=sqlcipher_extra_shutdown \
                    -I$HOME/libressl/include" \
            LDFLAGS="$HOME/libressl/lib/libcrypto.a"
          make sqlite3.c

      - name: Compile WASM (SQLCipher + QJSON + libbf)
        run: |
          mkdir -p wasm/dist && cd wasm/dist
          cp ../../sqlcipher-libressl/sqlite3.c .
          cp ../../sqlcipher-libressl/sqlite3.h .
          cp ../../sqlcipher-libressl/src/sqlite3ext.h .
          cp ../../sqlcipher-libressl/wasm/sqlcipher_wasm.c .
          cp ../../sqlcipher-libressl/wasm/opfs_vfs.c .
          cp ../../native/qjson_wasm_init.c . 2>/dev/null || cp ../../wasm/qjson_wasm_init.c .
          cp ../../native/qjson.h ../../native/qjson_types.h .
          cp ../../native/qjson.c .
          cp ../../native/qjson_lex.h ../../native/qjson_lex.c .
          cp ../../native/qjson_parse.h ../../native/qjson_parse.c .
          cp ../../native/qjson_parse_ctx.h .
          cp ../../native/qjson_sqlite_ext.c .
          cp ../../native/libbf/libbf.h ../../native/libbf/libbf.c .
          cp ../../native/libbf/cutils.h ../../native/libbf/cutils.c .

          EXPORTED='["_wasm_db_open","_wasm_db_close","_wasm_db_exec","_wasm_db_errmsg","_wasm_db_changes","_wasm_db_total_changes","_wasm_db_key","_wasm_db_prepare","_wasm_stmt_finalize","_wasm_stmt_reset","_wasm_stmt_clear_bindings","_wasm_stmt_step","_wasm_stmt_bind_text","_wasm_stmt_bind_int","_wasm_stmt_bind_double","_wasm_stmt_bind_null","_wasm_stmt_bind_parameter_count","_wasm_stmt_columns","_wasm_stmt_colname","_wasm_stmt_coltype","_wasm_stmt_int","_wasm_stmt_double","_wasm_stmt_text","_sqlite3_opfs_init","_malloc","_free"]'
          RUNTIME='["cwrap","UTF8ToString","stringToUTF8","lengthBytesUTF8"]'

          emcc sqlcipher_wasm.c opfs_vfs.c qjson_wasm_init.c \
               qjson.c qjson_lex.c qjson_parse.c \
               libbf.c cutils.c \
            -I. -I$HOME/libressl-wasm/include \
            -O2 \
            -DSQLITE_HAS_CODEC \
            -DSQLCIPHER_CRYPTO_OPENSSL \
            -DSQLITE_EXTRA_INIT=sqlcipher_extra_init \
            -DSQLITE_EXTRA_SHUTDOWN=sqlcipher_extra_shutdown \
            -DSQLITE_OMIT_LOAD_EXTENSION \
            -DSQLITE_THREADSAFE=0 \
            -DSQLITE_TEMP_STORE=2 \
            -DSQLITE_ENABLE_FTS5 \
            -DSQLITE_ENABLE_JSON1 \
            -DQJSON_USE_LIBBF \
            -s WASM=1 \
            -s EXPORTED_FUNCTIONS="$EXPORTED" \
            -s EXPORTED_RUNTIME_METHODS="$RUNTIME" \
            -s ALLOW_MEMORY_GROWTH=1 \
            -s INITIAL_MEMORY=16777216 \
            -s MODULARIZE=1 \
            -s EXPORT_NAME="initSqlcipher" \
            -s ENVIRONMENT='web,worker' \
            $HOME/libressl-wasm/lib/libcrypto.a \
            -o sqlcipher.js

          # Clean up source copies
          rm -f sqlite3.c sqlite3.h sqlite3ext.h sqlcipher_wasm.c opfs_vfs.c \
                qjson_wasm_init.c qjson.h qjson_types.h qjson.c \
                qjson_lex.h qjson_lex.c qjson_parse.h qjson_parse.c \
                qjson_parse_ctx.h qjson_sqlite_ext.c \
                libbf.h libbf.c cutils.h cutils.c
          ls -lh sqlcipher.js sqlcipher.wasm

      - name: Copy JS helpers
        run: |
          cp sqlcipher-libressl/wasm/sqlcipher-api.js wasm/dist/ 2>/dev/null || true
          cp sqlcipher-libressl/wasm/sqlcipher-worker.js wasm/dist/ 2>/dev/null || true
          cp src/qjson.js wasm/dist/

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qjson-sqlcipher-wasm
          path: |
            wasm/dist/sqlcipher.js
            wasm/dist/sqlcipher.wasm
            wasm/dist/sqlcipher-api.js
            wasm/dist/sqlcipher-worker.js
            wasm/dist/qjson.js
          retention-days: 90

  # ── SQLCipher tests ───────────────────────────────────────
  sqlcipher:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout sqlcipher-libressl
        uses: actions/checkout@v4
        with:
          repository: wmacevoy/sqlcipher-libressl
          path: sqlcipher-libressl

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install LibreSSL
        run: |
          curl -sL https://github.com/libressl/portable/releases/download/v4.2.1/libressl-4.2.1.tar.gz | tar xz
          cd libressl-4.2.1
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=$HOME/libressl \
            -DLIBRESSL_APPS=OFF -DLIBRESSL_TESTS=OFF -DBUILD_SHARED_LIBS=OFF
          make -j$(nproc) && make install

      - name: Build SQLCipher
        run: |
          cd sqlcipher-libressl
          ./configure --with-tempstore=yes \
            CFLAGS="-DSQLITE_HAS_CODEC -DSQLCIPHER_CRYPTO_OPENSSL \
                    -DSQLITE_EXTRA_INIT=sqlcipher_extra_init \
                    -DSQLITE_EXTRA_SHUTDOWN=sqlcipher_extra_shutdown \
                    -I$HOME/libressl/include" \
            LDFLAGS="$HOME/libressl/lib/libcrypto.a"
          make -j$(nproc) sqlite3.c

      - name: Build QJSON extension for SQLCipher
        run: |
          make qjson_ext_sqlcipher.so \
            SQLCIPHER_DIR=sqlcipher-libressl

      - name: Install pysqlcipher3
        run: |
          pip install pysqlcipher3 \
            --global-option=build_ext \
            --global-option="-I$(pwd)/sqlcipher-libressl/src" \
            --global-option="-L$(pwd)/sqlcipher-libressl/.libs" \
            --global-option="-l:$HOME/libressl/lib/libcrypto.a" \
          || echo "pysqlcipher3 install failed — running basic test instead"

      - name: SQLCipher encryption round-trip test
        run: |
          python3 -c "
          import sys, os
          sys.path.insert(0, 'src')

          # Try pysqlcipher3, fall back to plain sqlite3 (key is no-op)
          try:
              from pysqlcipher3 import dbapi2 as sqlcipher
              conn = sqlcipher.connect(':memory:')
              HAS_CIPHER = True
          except ImportError:
              import sqlite3
              conn = sqlite3.connect(':memory:')
              HAS_CIPHER = False

          from qjson_sql import qjson_sql_adapter
          from qjson import BigInt, BigFloat, Blob, Unbound
          from decimal import Decimal

          key = 'ci-test-key' if HAS_CIPHER else None
          a = qjson_sql_adapter(conn, key=key)
          a['setup']()

          # Store all types
          vid = a['store']({
              'n': 42,
              'bi': BigInt(9007199254740993),
              'bd': Decimal('0.1'),
              'bf': BigFloat('3.14'),
              's': 'hello',
              'b': Blob(b'\x01\x02'),
              'arr': [1, 2, 3],
              'obj': {'nested': True},
              'nil': None,
              'yes': True,
              'no': False,
              'var': Unbound('X'),
          })
          a['commit']()

          # Load and verify
          v = a['load'](vid)
          assert v['n'] == 42.0
          assert isinstance(v['bi'], BigInt) and int(v['bi']) == 9007199254740993
          assert isinstance(v['bd'], Decimal) and v['bd'] == Decimal('0.1')
          assert isinstance(v['bf'], BigFloat) and str(v['bf']) == '3.14'
          assert v['s'] == 'hello'
          assert isinstance(v['b'], Blob) and v['b'].data == b'\x01\x02'
          assert v['arr'] == [1.0, 2.0, 3.0]
          assert v['obj'] == {'nested': True}
          assert v['nil'] is None
          assert v['yes'] is True
          assert v['no'] is False
          assert isinstance(v['var'], Unbound) and v['var'].name == 'X'

          a['close']()
          cipher_status = 'SQLCipher (encrypted)' if HAS_CIPHER else 'sqlite3 (key no-op)'
          print('SQLCipher round-trip: ALL PASSED (%s)' % cipher_status)
          "

  # ── E2E browser tests (Playwright) ────────────────────────
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Playwright
        run: |
          cd test/e2e
          npm init -y
          npm install @playwright/test
          npx playwright install chromium

      - name: Download WASM from latest release
        run: |
          mkdir -p docs/wasm
          gh release download --pattern 'qjson-sqlcipher-wasm.tar.gz' --dir /tmp || true
          if [ -f /tmp/qjson-sqlcipher-wasm.tar.gz ]; then
            tar xzf /tmp/qjson-sqlcipher-wasm.tar.gz -C docs/wasm
            echo "QJSON_WASM_AVAILABLE=1" >> $GITHUB_ENV
            echo "WASM files extracted to docs/wasm/"
            ls -la docs/wasm/
          else
            echo "No WASM release found — WASM tests will be skipped"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run e2e tests
        run: |
          cd test/e2e
          npx playwright test
